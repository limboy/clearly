name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize, and publish DMG
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Xcode 26.3 crashes while compiling the Icon Composer asset on the
          # macos-15 runner. Xcode 26.2 builds the shipping icon correctly.
          xcode-version: "26.2"

      - name: Install release tools
        run: brew install xcodegen create-dmg

      - name: Build signed and notarized DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY_NAME: ${{ secrets.SIGNING_IDENTITY_NAME }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/release-ci.sh "$VERSION"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" build/Clearly.dmg \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Clearly $GITHUB_REF_NAME" \
              --notes-file build/release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" build/Clearly.dmg \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "Clearly $GITHUB_REF_NAME" \
              --notes-file build/release-notes.md
          fi

      - name: Update Sparkle appcast
        run: |
          cp build/appcast.xml website/appcast.xml
          bash scripts/lib/changelog-html.sh

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/appcast.xml website/changelog.html

          if ! git diff --cached --quiet; then
            git commit -m "[chore] Update appcast for $GITHUB_REF_NAME"
            git push origin HEAD:main
          fi

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}-diagnostics
          path: |
            build/release-notes.md
            build/appcast.xml
            build/notarization-*.json
          if-no-files-found: ignore
          retention-days: 14

