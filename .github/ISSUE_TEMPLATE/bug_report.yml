name: Bug Report
description: Something isn't working right
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: "When I do X, Y happens. I expected Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we see this bug?
      placeholder: |
        1. Open a markdown file with...
        2. Switch to preview mode
        3. See...
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      description: "Clearly → Settings → About."
      placeholder: "e.g. 2.4.0 (240)"
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Installation source
      description: How did you install Clearly?
      options:
        - Direct download (Sparkle / GitHub)
        - Mac App Store
        - Not sure
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: "Apple menu → About This Mac."
      placeholder: "e.g. macOS 26.1"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop screenshots here.
    validations:
      required: false

  - type: textarea
    id: file
    attributes:
      label: Problematic file
      description: If a specific markdown file triggers the bug, paste its contents or attach it here.
    validations:
      required: false
